<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Sort - Carmen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* WELCOME SCREEN */
  #welcome-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 24px;
    animation: fadeIn 0.5s ease;
  }

  #welcome-screen .emoji-row {
    font-size: 3rem;
    animation: bounce 1s infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-12px); }
  }

  #welcome-screen h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 30px rgba(255,180,50,0.8);
    line-height: 1.2;
  }

  #welcome-screen h1 span {
    color: #ffd700;
    display: block;
    font-size: 3.2rem;
  }

  #welcome-screen p {
    color: rgba(255,255,255,0.75);
    font-size: 1.1rem;
    text-align: center;
    max-width: 280px;
  }

  .btn-play {
    margin-top: 12px;
    padding: 16px 48px;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    border: none;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #1a1a2e;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(255,210,0,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn-play:hover {
    transform: scale(1.07);
    box-shadow: 0 12px 35px rgba(255,210,0,0.7);
  }

  /* WIN SCREEN */
  #win-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0f0c29cc, #302b63cc);
    backdrop-filter: blur(6px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 20px;
  }

  #win-screen.show { display: flex; animation: fadeIn 0.4s ease; }

  #win-screen .trophy { font-size: 5rem; animation: pulse 0.8s infinite alternate; }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
  }

  #win-screen h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: #ffd700;
    text-align: center;
    text-shadow: 0 0 20px rgba(255,215,0,0.8);
  }

  #win-screen p {
    color: #fff;
    font-size: 1.1rem;
    text-align: center;
  }

  .confetti {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 200;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* GAME */
  #game-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    width: 100%;
    max-width: 520px;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 4px;
  }

  #level-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: #ffd700;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,0,0.3);
    padding: 8px 20px;
    border-radius: 30px;
  }

  #moves-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: #a8edea;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(168,237,234,0.3);
    padding: 8px 20px;
    border-radius: 30px;
  }

  .btn-icon {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: #fff;
    font-size: 1.2rem;
    padding: 8px 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-icon:hover { background: rgba(255,255,255,0.2); }

  #tubes-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    width: 100%;
  }

  .tube {
    width: 58px;
    height: 210px;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 0 0 30px 30px;
    border-top: none;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    justify-content: flex-start;
    padding: 6px 6px;
    gap: 4px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .tube::before {
    content: '';
    position: absolute;
    top: -8px;
    left: -2px;
    right: -2px;
    height: 10px;
    border: 2px solid rgba(255,255,255,0.15);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
  }

  .tube.selected {
    border-color: #ffd700;
    box-shadow: 0 0 20px rgba(255,215,0,0.5);
  }

  .tube.selected::before {
    border-color: #ffd700;
  }

  .tube.complete {
    border-color: #00ff88;
    box-shadow: 0 0 15px rgba(0,255,136,0.4);
  }

  .ball {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: transform 0.15s;
    position: relative;
  }

  .ball::after {
    content: '';
    position: absolute;
    top: 6px; left: 8px;
    width: 12px; height: 8px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    transform: rotate(-30deg);
  }

  .tube:hover:not(.complete) .ball:last-child {
    transform: translateY(-4px);
  }

  /* Ball colors */
  .ball.red    { background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b); }
  .ball.blue   { background: radial-gradient(circle at 35% 35%, #74b9ff, #2980b9); }
  .ball.green  { background: radial-gradient(circle at 35% 35%, #55efc4, #27ae60); }
  .ball.yellow { background: radial-gradient(circle at 35% 35%, #fdcb6e, #e67e22); }
  .ball.purple { background: radial-gradient(circle at 35% 35%, #a29bfe, #6c3483); }
  .ball.orange { background: radial-gradient(circle at 35% 35%, #fd9644, #e17055); }
  .ball.pink   { background: radial-gradient(circle at 35% 35%, #fd79a8, #e84393); }
  .ball.cyan   { background: radial-gradient(circle at 35% 35%, #81ecec, #00b894); }
  .ball.gray   { background: radial-gradient(circle at 35% 35%, #b2bec3, #636e72); }
  .ball.lime   { background: radial-gradient(circle at 35% 35%, #b8e994, #78e08f); }

  #controls {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .btn-action {
    padding: 12px 24px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 14px;
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-action:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.04);
  }

  #level-select {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .lvl-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lvl-btn.active { background: #ffd700; color: #1a1a2e; }
  .lvl-btn:hover:not(.active) { background: rgba(255,255,255,0.15); }

  #extra-tube-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, #00b894, #00cec9);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,184,148,0.4);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #extra-tube-btn:hover { transform: scale(1.05); box-shadow: 0 10px 28px rgba(0,184,148,0.6); }
  #extra-tube-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  #extra-tube-info {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    color: #00cec9;
    background: rgba(0,206,201,0.1);
    border: 1px solid rgba(0,206,201,0.3);
    border-radius: 10px;
    padding: 5px 14px;
  }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div id="welcome-screen">
  <div class="emoji-row">🎮 🌈 🎯</div>
  <h1>Bem-vinda,<span>Carmen!</span></h1>
  <p>Separe as bolas por cores para completar cada fase. Boa sorte! 🍀</p>
  <button class="btn-play" onclick="startGame()">▶ Jogar Agora</button>
</div>

<!-- WIN SCREEN -->
<div id="win-screen">
  <div class="trophy">🏆</div>
  <h2>Muito bem, Carmen! 🎉</h2>
  <p>Você completou a fase com maestria!</p>
  <div style="display:flex;gap:12px;margin-top:12px;">
    <button class="btn-play" onclick="nextLevel()" style="padding:14px 30px;font-size:1.1rem;">Próxima Fase ▶</button>
    <button class="btn-play" onclick="restartLevel()" style="padding:14px 30px;font-size:1.1rem;background:linear-gradient(135deg,#a29bfe,#6c5ce7);box-shadow:0 8px 25px rgba(108,92,231,0.5);">Repetir 🔄</button>
  </div>
</div>

<!-- GAME -->
<div id="game-container">
  <div id="header">
    <div id="level-badge">Nível 1</div>
    <div id="moves-badge">Movimentos: 0</div>
    <button class="btn-icon" onclick="restartLevel()" title="Reiniciar">🔄</button>
  </div>

  <div id="level-select"></div>
  <div id="tubes-container"></div>

  <div id="controls">
    <button class="btn-action" onclick="undoMove()">↩ Desfazer</button>
    <button class="btn-action" onclick="restartLevel()">🔄 Reiniciar</button>
  </div>

  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;">
    <button id="extra-tube-btn" onclick="addExtraTube()">🧪 + Copo Extra</button>
    <span id="extra-tube-info">3 extras disponíveis</span>
  </div>
</div>

<script>
// ── LEVELS ──────────────────────────────────────────────────────────────────
const LEVELS = [
  // Level 1 – 4 colors, easy
  {
    tubes: [
      ['red','blue','green','red'],
      ['green','blue','red','blue'],
      ['green','red','blue','green'],
      [], []
    ]
  },
  // Level 2 – 5 colors
  {
    tubes: [
      ['purple','red','blue','green'],
      ['yellow','purple','green','red'],
      ['blue','yellow','red','purple'],
      ['green','blue','yellow','yellow'],
      ['purple','green','red','blue'],
      [], []
    ]
  },
  // Level 3 – 6 colors
  {
    tubes: [
      ['orange','pink','red','blue'],
      ['green','orange','blue','pink'],
      ['red','green','pink','orange'],
      ['blue','red','orange','green'],
      ['pink','blue','green','red'],
      ['orange','yellow','yellow','pink'],
      [], []
    ]
  },
  // Level 4 – 7 colors
  {
    tubes: [
      ['cyan','red','blue','green'],
      ['yellow','cyan','green','red'],
      ['blue','yellow','red','cyan'],
      ['green','blue','yellow','yellow'],
      ['cyan','green','red','blue'],
      ['purple','pink','cyan','purple'],
      ['pink','purple','green','pink'],
      [], []
    ]
  },
  // Level 5 – 8 colors
  {
    tubes: [
      ['gray','red','blue','green'],
      ['yellow','gray','green','red'],
      ['blue','yellow','red','gray'],
      ['green','blue','yellow','yellow'],
      ['gray','green','red','blue'],
      ['purple','pink','cyan','purple'],
      ['pink','purple','orange','pink'],
      ['cyan','orange','gray','cyan'],
      ['orange','cyan','purple','orange'],
      [], []
    ]
  }
];

// ── STATE ────────────────────────────────────────────────────────────────────
let currentLevel = 0;
let tubes = [];
let selectedTube = null;
let moves = 0;
let history = [];
let extraTubesLeft = 3;

// ── INIT ─────────────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('welcome-screen').style.display = 'none';
  buildLevelSelect();
  loadLevel(0);
}

function buildLevelSelect() {
  const container = document.getElementById('level-select');
  container.innerHTML = '';
  LEVELS.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'lvl-btn' + (i === 0 ? ' active' : '');
    btn.textContent = i + 1;
    btn.onclick = () => loadLevel(i);
    container.appendChild(btn);
  });
}

function loadLevel(index) {
  currentLevel = index;
  const levelData = LEVELS[index];
  tubes = levelData.tubes.map(t => [...t]);
  selectedTube = null;
  moves = 0;
  history = [];
  extraTubesLeft = 3;
  document.getElementById('win-screen').classList.remove('show');
  updateLevelBadge();
  updateMoves();
  updateExtraBtn();
  renderTubes();
  // highlight active level btn
  document.querySelectorAll('.lvl-btn').forEach((b, i) => {
    b.classList.toggle('active', i === index);
  });
}

function restartLevel() {
  loadLevel(currentLevel);
}

function nextLevel() {
  const next = (currentLevel + 1) % LEVELS.length;
  loadLevel(next);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderTubes() {
  const container = document.getElementById('tubes-container');
  container.innerHTML = '';
  tubes.forEach((tube, i) => {
    const el = document.createElement('div');
    el.className = 'tube' + (selectedTube === i ? ' selected' : '') + (isTubeComplete(tube) ? ' complete' : '');
    el.onclick = () => handleTubeClick(i);
    tube.forEach(color => {
      const ball = document.createElement('div');
      ball.className = 'ball ' + color;
      el.appendChild(ball);
    });
    container.appendChild(el);
  });
}

// ── LOGIC ────────────────────────────────────────────────────────────────────
function handleTubeClick(index) {
  if (selectedTube === null) {
    // select if tube has balls
    if (tubes[index].length > 0) {
      selectedTube = index;
      renderTubes();
    }
    return;
  }

  if (selectedTube === index) {
    // deselect
    selectedTube = null;
    renderTubes();
    return;
  }

  // try to move
  const from = tubes[selectedTube];
  const to = tubes[index];

  if (canMove(from, to)) {
    // save history
    history.push(tubes.map(t => [...t]));
    // move all matching top balls
    const topColor = from[from.length - 1];
    while (from.length > 0 && from[from.length - 1] === topColor && to.length < 4) {
      to.push(from.pop());
    }
    moves++;
    updateMoves();
    selectedTube = null;
    renderTubes();
    checkWin();
  } else {
    // switch selection
    if (tubes[index].length > 0) {
      selectedTube = index;
    } else {
      selectedTube = null;
    }
    renderTubes();
  }
}

function canMove(from, to) {
  if (from.length === 0) return false;
  if (to.length >= 4) return false;
  if (to.length === 0) return true;
  return from[from.length - 1] === to[to.length - 1];
}

function isTubeComplete(tube) {
  if (tube.length !== 4) return false;
  return tube.every(c => c === tube[0]);
}

function checkWin() {
  const filledTubes = tubes.filter(t => t.length > 0);
  if (filledTubes.every(t => isTubeComplete(t))) {
    setTimeout(showWin, 400);
  }
}

function showWin() {
  document.getElementById('win-screen').classList.add('show');
  spawnConfetti();
}

function undoMove() {
  if (history.length === 0) return;
  tubes = history.pop();
  moves = Math.max(0, moves - 1);
  selectedTube = null;
  updateMoves();
  renderTubes();
}

function addExtraTube() {
  if (extraTubesLeft <= 0) return;
  history.push(tubes.map(t => [...t]));
  tubes.push([]);
  extraTubesLeft--;
  selectedTube = null;
  updateExtraBtn();
  renderTubes();
}

function updateExtraBtn() {
  const btn = document.getElementById('extra-tube-btn');
  const info = document.getElementById('extra-tube-info');
  btn.disabled = extraTubesLeft <= 0;
  if (extraTubesLeft === 0) {
    info.textContent = 'Sem extras restantes';
    info.style.color = '#ff7675';
    info.style.borderColor = 'rgba(255,118,117,0.3)';
    info.style.backgr
